# Server
server.port=8080

# MySQL Database - update username/password for your machine
spring.datasource.url=jdbc:mysql://localhost:3306/adminpulse_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Sample data is loaded via DataInitializer.java when tables are empty
# You can also run schema.sql manually in MySQL Workbench
